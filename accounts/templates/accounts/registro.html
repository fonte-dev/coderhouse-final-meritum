{% extends 'base.html' %}
{% block content %}

<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5"> <div class="card shadow-lg border-0 p-4 p-md-5 mt-4">
            
            <h2 class="text-center text-primary mb-4 fw-bold">Crear Cuenta</h2>
            
            <form method="POST">
                {% csrf_token %}
                
                {{ form.as_p }}
                
                <div class="d-grid mt-4">
                    <button type="submit" class="btn btn-primary btn-lg fw-bold">Registrarme</button>
                </div>
            </form>
            
            <div class="text-center mt-3">
                <small class="text-muted">¿Ya tenés cuenta? <a href="{% url 'login' %}" class="text-primary text-decoration-none fw-bold">Iniciá sesión acá</a></small>
            </div>
            
        </div>
    </div>
</div>

{% endblock %}
