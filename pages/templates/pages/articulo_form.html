{% extends 'base.html' %}
{% block title %}Editar Artículo{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <h2 class="mb-4">Editar Artículo</h2>
        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            {{ form.media }}
            
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary mt-3">Guardar Cambios</button>
            <a href="{% url 'articulos' %}" class="btn btn-outline-secondary mt-3">Cancelar</a>
        </form>
    </div>
</div>
{% endblock %}
