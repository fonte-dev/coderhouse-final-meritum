{% extends 'base.html' %}
{% block title %}Borrar Artículo{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 text-center mt-5">
        <h2 class="text-danger mb-4">¡Peligro!</h2>
        <p class="fs-5">¿Estás seguro que querés eliminar el artículo <strong>"{{ object.titulo }}"</strong>?</p>
        <p class="text-muted">Esta acción no se puede deshacer.</p>
        
        <form method="POST">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Sí, eliminar</button>
            <a href="{% url 'articulo_detalle' object.pk %}" class="btn btn-secondary">Cancelar</a>
        </form>
    </div>
</div>
{% endblock %}
